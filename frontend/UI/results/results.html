<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoCode | Results</title>
<link rel="stylesheet" href="/style.css">

</head>
<body class="scrollable">
<nav class="top-nav">
  <a href="/" class="brand">EcoCode</a>
  <div class="nav-links">
    <a href="/summary" class="nav-item">Summary</a>
    <a href="/questionnaire" class="nav-item">Questionnaire</a>
  </div>
</nav>

<main class="content-wrapper">
  <header class="summary-header">
    <h1>Your <span class="green">Recommended Certificates</span></h1>
    <p>Based on your answers, here are your results and scores.</p>
  </header>

  <section class="certificate-grid" id="certificate-grid"></section>
</main>

<script>
const BACKEND_URL = "http://localhost:3000";
const surveyResult = JSON.parse(localStorage.getItem("surveyResult")) || [];
const grid = document.getElementById("certificate-grid");

async function loadResults() {
  const sortedResults = [...surveyResult].sort((a,b)=>b.total-a.total);

  for (const cert of sortedResults) {
    const totalPercent = Math.round(cert.total * 100);
    let summaryData = null;

    try {
      const res = await fetch(`${BACKEND_URL}/summary/${cert.id}`);
      if (res.ok) {
        const text = await res.text();
        summaryData = text ? JSON.parse(text) : null;
      }
    } catch(err) {
      console.error("Summary fetch failed", err);
    }

    const card = document.createElement("div");
    card.classList.add("cert-card", "enhanced");

    // Percent & title
    const percentDiv = document.createElement("div");
    percentDiv.className = "percent";
    percentDiv.textContent = totalPercent + "%";
    const titleH3 = document.createElement("h3");
    titleH3.textContent = cert.name;
    card.appendChild(percentDiv);
    card.appendChild(titleH3);

    // Summary
    if (summaryData?.summary) {
      const p = document.createElement("p");
      p.className = "description";
      const summaryText = summaryData.summary.length > 200 
        ? summaryData.summary.slice(0, summaryData.summary.slice(0,200).lastIndexOf(' ')) + '…'
        : summaryData.summary;
      p.textContent = summaryText;
      card.appendChild(p);
    }

    // Sort labels descending
    const sortedLabels = [...cert.labels].sort((a,b)=>Object.values(b)[0]-Object.values(a)[0]);

    // Badges
    const badgesDiv = document.createElement("div");
    badgesDiv.className = "labels";
    sortedLabels.forEach(lblObj=>{
      const lblName = Object.keys(lblObj)[0];
      let lblValue = Math.round(Object.values(lblObj)[0]*100);
      let colorClass = lblValue < 20 ? 'red' : lblValue < 50 ? 'orange' : lblValue < 80 ? 'yellow' : 'green';
      const badge = document.createElement("span");
      badge.className = "badge "+colorClass;
      badge.textContent = lblName + ": "+lblValue+"%";
      badgesDiv.appendChild(badge);
    });
    card.appendChild(badgesDiv);

    // Lists
    const achievedUl = document.createElement("ul");
    achievedUl.className = "list good links-list";
    const todoUl = document.createElement("ul");
    todoUl.className = "list bad links-list";

    const recommendations = cert.recommendations || [];

    sortedLabels.forEach(lblObj=>{
      const lblName = Object.keys(lblObj)[0];
      const lblValue = Math.round(Object.values(lblObj)[0]*100);
      let recObj = recommendations.find(r=>r[lblName]);
      let recs = recObj ? recObj[lblName] : ["test"];

      const li = document.createElement("li");
      li.className = "label-item";

      const headerDiv = document.createElement("div");
      headerDiv.className = "label-header";

      // Label name + percentage in white
      const labelSpan = document.createElement("span");
      labelSpan.className = "label-name";
      labelSpan.textContent = lblName + " ";

      const toggleArrow = document.createElement("button");
      toggleArrow.className = "toggle-arrow";
      toggleArrow.innerHTML = "&#9660;";

      const recUl = document.createElement("ul");
      recUl.className = "recommendations";
      recUl.style.display = "none";
      recs.forEach(r=>{
        const recLi = document.createElement("li");
        recLi.textContent = r;
        recUl.appendChild(recLi);
      });

      toggleArrow.addEventListener("click", ()=>{
        const isHidden = recUl.style.display === "none";
        recUl.style.display = isHidden ? "block" : "none";
        toggleArrow.classList.toggle("rotated", isHidden);
      });

      headerDiv.appendChild(labelSpan);
      headerDiv.appendChild(toggleArrow);

      li.appendChild(headerDiv);
      li.appendChild(recUl);

      if(lblValue>=50) achievedUl.appendChild(li);
      else todoUl.appendChild(li);
    });

    const achievedH4 = document.createElement("h4");
    achievedH4.className = "achieved";
    achievedH4.textContent = "Achieved";
    card.appendChild(achievedH4);
    card.appendChild(achievedUl);

    if(todoUl.children.length>0){
      const todoH4 = document.createElement("h4");
      todoH4.className = "todo";
      todoH4.textContent = "TODO";
      card.appendChild(todoH4);
      const todoDiv = document.createElement("div");
      todoDiv.className = "todo-zone";
      todoDiv.appendChild(todoUl);
      card.appendChild(todoDiv);
    }

    if(summaryData?.links?.length){
      const linksDiv = document.createElement("div");
      linksDiv.className = "links";
      const linksH4 = document.createElement("h4");
      linksH4.textContent = "Useful Links";
      linksDiv.appendChild(linksH4);
      const linksUl = document.createElement("ul");
      linksUl.className = "links-list";
      summaryData.links.forEach(link=>{
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = link;
        a.target = "_blank";
        a.textContent = link;
        li.appendChild(a);
        linksUl.appendChild(li);
      });
      linksDiv.appendChild(linksUl);
      card.appendChild(linksDiv);
    }

    const moreLink = document.createElement("a");
    moreLink.href = "/summary/"+cert.id;
    moreLink.className = "load-more";
    moreLink.textContent = "See More →";
    card.appendChild(moreLink);

    grid.appendChild(card);
  }
}

loadResults();
</script>
</body>
</html>
