<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCode | Summary</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="scrollable">
    <nav class="top-nav">
        <a href="/" class="brand">EcoCode</a>
        <div class="nav-links">
            <a href="/summary" class="nav-item active">Summary</a>
            <a href="/questionnaire" class="nav-item">Questionnaire</a>
        </div>
    </nav>

    <main class="content-wrapper">
        <header class="summary-header">
            <h1>Sustainability <span class="green">Certificates</span></h1>
            <p>Search and filter leading standards in Green Computing.</p>

            <div class="controls">
                <input type="text" id="searchInput" placeholder="Search by name..." onkeyup="filterCards()">
                <select id="categoryFilter" onchange="filterCards()">
                    <option value="all">All Categories</option>
                    <option value="software">Software</option>
                    <option value="hardware">Hardware</option>
                    <option value="infrastructure">Infrastructure</option>
                </select>
            </div>
        </header>

        <section class="certificate-grid" id="certGrid"></section>
    </main>

    <script>
        const BACKEND_URL = "http://localhost:3000";
        const certGrid = document.getElementById("certGrid");

        // Truncate text without cutting words
        function truncateText(text, maxLength) {
            if (!text) return '';
            if (text.length <= maxLength) return text;
            let truncated = text.substr(0, maxLength);
            if (text[maxLength] !== ' ') {
                const lastSpace = truncated.lastIndexOf(' ');
                if (lastSpace > 0) truncated = truncated.substr(0, lastSpace);
            }
            return truncated + '...';
        }

        async function loadCertificates() {
            try {
                // Fetch all labels
                const resLabels = await fetch(`${BACKEND_URL}/labels`);
                const labelsData = await resLabels.json();
                const labelMap = Object.fromEntries(
                    Object.entries(labelsData).map(([id, name]) => [id, name])
                );

                // Fetch all certificates
                const resCerts = await fetch(`${BACKEND_URL}/certificates`);
                const certificates = await resCerts.json();

                for (const cert of certificates) {
                    // Fetch summary for each certificate
                    let summaryData = null;
                    try {
                        const resSummary = await fetch(`${BACKEND_URL}/summary/${cert.id}`);
                        if (resSummary.ok) summaryData = await resSummary.json();
                    } catch (err) {
                        console.error(`Failed to fetch summary for certificate ${cert.id}`, err);
                    }

                    // Convert label IDs to label names
                    const labelNames = cert.labels?.map(id => labelMap[id] || id) || [];

                    const truncatedSummary = truncateText(summaryData?.summary, 250);

                    const card = document.createElement("div");
                    card.classList.add("cert-card");
                    card.setAttribute("data-name", cert.name.toLowerCase());
                    card.setAttribute("data-category", cert.category || "all");

                    card.innerHTML = `
                        <h3>${cert.name}</h3>
                        ${truncatedSummary ? `<p class="description">${truncatedSummary}</p>` : ''}
                        ${labelNames.length ? `<p class="labels-inline">${labelNames.join(', ')}</p>` : ''}
                        ${summaryData?.links?.length ? `
                            <h4>Useful Links</h4>
                            <ul class="links-list indent">
                                ${summaryData.links.map(link => `<li><a href="${link}" target="_blank">${link}</a></li>`).join('')}
                            </ul>
                        ` : ''}
                        <a href="/summary/${cert.id}" class="load-more">See More →</a>
                    `;

                    certGrid.appendChild(card);
                }

            } catch (err) {
                console.error("Failed to load certificates:", err);
            }
        }

        loadCertificates();

        function filterCards() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const categoryQuery = document.getElementById('categoryFilter').value;
            const cards = document.querySelectorAll('.cert-card');

            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                const category = card.getAttribute('data-category');

                const matchesSearch = name.includes(searchQuery);
                const matchesCategory = categoryQuery === 'all' || category === categoryQuery;

                card.style.display = (matchesSearch && matchesCategory) ? "flex" : "none";
            });
        }
    </script>
</body>
</html>
