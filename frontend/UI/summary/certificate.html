<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCode | Certificate Details</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="scrollable">

<nav class="top-nav">
    <a href="/" class="brand">EcoCode</a>
    <div class="nav-links">
        <a href="/summary" class="nav-item">Summary</a>
        <a href="/questionnaire" class="nav-item">Questionnaire</a>
    </div>
</nav>

<main class="content-wrapper">
    <section id="certDetail" class="cert-card enhanced"></section>
</main>

<script>
    const BACKEND_URL = "http://localhost:3000";
    const certDetailEl = document.getElementById('certDetail');

    // Get certificate ID from URL
    const certId = window.location.pathname.split('/').pop();

    async function loadCertificateDetail() {
        try {
            // Fetch certificate
            const resCert = await fetch(`${BACKEND_URL}/certificates/${certId}`);
            const cert = await resCert.json();

            // Fetch labels
            const resLabels = await fetch(`${BACKEND_URL}/labels`);
            const labelsData = await resLabels.json();
            const labelMap = Object.fromEntries(
                Object.entries(labelsData).map(([id, name]) => [id, name])
            );

            const labelNames = cert.labels?.map(id => labelMap[id] || id) || [];

            // Fetch summary
            let summaryData = null;
            try {
                const resSummary = await fetch(`${BACKEND_URL}/summary/${certId}`);
                if (resSummary.ok) summaryData = await resSummary.json();
            } catch (err) {
                console.error(`Failed to fetch summary for certificate ${certId}`, err);
            }

            certDetailEl.innerHTML = `
                <h3>${cert.name}</h3>
                ${summaryData?.summary ? `<p class="description">${summaryData.summary}</p>` : ''}
                ${labelNames.length ? `<p class="labels-inline">${labelNames.join(', ')}</p>` : ''}
                ${summaryData?.links?.length ? `
                    <h4>Useful Links</h4>
                    <ul class="links-list indent">
                        ${summaryData.links.map(link => `<li><a href="${link}" target="_blank">${link}</a></li>`).join('')}
                    </ul>
                ` : ''}
            `;

        } catch (err) {
            console.error("Failed to load certificate detail:", err);
            certDetailEl.innerHTML = `<p style="color:red;">Failed to load certificate details.</p>`;
        }
    }

    loadCertificateDetail();
</script>
</body>
</html>
